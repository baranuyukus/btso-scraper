name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: BTSO-Scraper-Windows
            ext: .exe
          - os: macos-latest
            artifact: BTSO-Scraper-macOS
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train Model
        run: |
          python -c "
          import os, csv
          os.makedirs('dataset/images', exist_ok=True)
          os.makedirs('dataset/model', exist_ok=True)
          labels_path = 'dataset/labels.csv'
          if not os.path.exists(labels_path):
              with open(labels_path, 'w', newline='') as f:
                  csv.writer(f).writerow(['filename', 'label'])
          "
          python captcha_model.py || echo "Model training skipped (no dataset)"

      - name: Build with PyInstaller
        run: |
          python build.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows Build
        uses: actions/download-artifact@v4
        with:
          name: BTSO-Scraper-Windows
          path: windows/

      - name: Download macOS Build
        uses: actions/download-artifact@v4
        with:
          name: BTSO-Scraper-macOS
          path: macos/

      - name: Create Zip Archives
        run: |
          cd windows && zip -r ../BTSO-Scraper-Windows.zip . && cd ..
          cd macos && zip -r ../BTSO-Scraper-macOS.zip . && cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            BTSO-Scraper-Windows.zip
            BTSO-Scraper-macOS.zip
          generate_release_notes: true
